{{- if .Values.externalSecret.enabled -}}
apiVersion: {{ .Values.externalSecret.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "episodic.fullname" . }}
  labels:
    {{- include "episodic.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ required "externalSecret.secretStoreRef.name is required" .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "episodic.secretName" . }}
    creationPolicy: {{ .Values.externalSecret.creationPolicy }}
  data:
    {{- range $secretKey, $remoteRef := .Values.externalSecret.data }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        {{- toYaml $remoteRef | nindent 8 }}
    {{- end }}
{{- end }}
