name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-mutmut-workflow.md.
on:
  schedule:
    - cron: "5 7 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-mutmut.yml@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
    with:
      # Flat package layout: the mutable source lives in episodic/, not src/.
      paths: "episodic/"
      module-prefix-strip: ""
      # The project declares requires-python >= 3.14; the shared workflow's
      # default (3.13) would fail `uv run` inside the project.
      python-version: "3.14"
